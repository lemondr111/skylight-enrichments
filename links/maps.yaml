# Maps
# Mapping and geolocation services
#
# Fields:
#   id       — numeric string, from upstream source
#   provider — short source name (e.g. shodan, twitter)
#   display  — human-readable label
#   url      — URL template with {value}, {value:formatter} substitutions
#   types    — list of input types this link accepts
#   payWall  — Free | Freemium | Paid
#   region   — (optional) region hint, defaults to Global
#   priority — (optional) sort weight, higher = shown first, defaults to 0
#   description — (optional) freeform note
#   autorun  — (optional) true to run automatically, defaults to false

- id: '92206'
  provider: google
  display: Google Maps
  url: https://www.google.com/maps/search/{value}
  types: [gps-coordinates]
  payWall: Free
- id: '92205'
  provider: openstreetmap
  display: Open Street Map
  url: https://www.openstreetmap.org/search?query={value}&zoom=13
  types: [gps-coordinates]
  payWall: Free
- id: '92397'
  provider: ipLocation
  display: IP Location
  url: https://www.iplocation.net/?query={value}
  types: [ip-address]
  payWall: Free
  description: Find a geolocation of an IP address including latitude, longitude, city, region and country. Compare the data from multiple IP location providers.
- id: '92464'
  provider: you-get-signal
  display: you-get-signal
  url: https://www.yougetsignal.com/tools/network-location/?remoteAddress={value}
  types: [ip-address]
  payWall: Free
  description: A collection of uncomplicated, powerful network tools.
