# Social Profiles
# Profile aggregators, social account finders
#
# Fields:
#   id       — numeric string, from upstream source
#   provider — short source name (e.g. shodan, twitter)
#   display  — human-readable label
#   url      — URL template with {value}, {value:formatter} substitutions
#   types    — list of input types this link accepts
#   payWall  — Free | Freemium | Paid
#   region   — (optional) region hint, defaults to Global
#   priority — (optional) sort weight, higher = shown first, defaults to 0
#   description — (optional) freeform note
#   autorun  — (optional) true to run automatically, defaults to false

- id: '92317'
  provider: facebook
  display: Facebook Profile
  url: https://www.facebook.com/{value}
  types: [alias]
  payWall: Free
- id: '92314'
  provider: github
  display: Github - users search
  url: https://github.com/search?q={value}&type=users
  types: [alias]
  payWall: Free
- id: '92316'
  provider: instagram
  display: Instagram Profile
  url: https://www.instagram.com/{value}
  types: [alias]
  payWall: Free
- id: '92315'
  provider: x
  display: X - last tweets from user
  url: https://x.com/search?q=from%3A{value}&src=typed_query&f=live
  types: [alias]
  payWall: Free
- id: '92421'
  provider: pushshift
  display: Reddit
  url: https://api.pushshift.io/reddit/search/comment/?author={value}
  types: [alias]
  payWall: Free
  priority: 3
  description: This site is maintained by Jason Baumgartner and contains various articles relating to big data, social media ingest and analysis and general technology trends
- id: '92443'
  provider: tinder
  display: tinder
  url: https://www.tinder.com/@{value}
  types: [alias]
  payWall: Free
  description: Tinder is a location-based social search mobile app that allows users to like or dislike other users, and allows users to chat if both parties liked each other in the app. The app is often used as a dating site.
- id: '92447'
  provider: twitter
  display: twitter
  url: https://twitter.com/{value}
  types: [alias]
  payWall: Free
  priority: 6
  description: Twitter is a news and social networking service on which users post and interact with messages known as "tweets"
- id: '92448'
  provider: twitter
  display: twitter
  url: https://twitter.com/search?f=users&vertical=default&q={value}&src=typd
  types: [name]
  payWall: Free
  priority: 6
  description: Twitter is a news and social networking service on which users post and interact with messages known as "tweets"
- id: '92449'
  provider: twitter
  display: twitter
  url: https://twitter.com/hashtag/{value}
  types: [hashtag]
  payWall: Free
  priority: 6
  description: Twitter is a news and social networking service on which users post and interact with messages known as "tweets"
